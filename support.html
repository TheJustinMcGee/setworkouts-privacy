<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SetWorkouts Support</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f3ee;
      --card: #fffdf9;
      --text: #1f1a17;
      --muted: #5e534a;
      --border: #ddd3c7;
      --accent: #8a4b24;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at top left, #fff6ea 0, transparent 35%),
        linear-gradient(180deg, #f8f4ee 0%, #f2ede6 100%);
      color: var(--text);
      line-height: 1.65;
    }

    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 48px 20px 64px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px 24px;
      box-shadow: 0 10px 30px rgba(31, 26, 23, 0.06);
    }

    h1, h2 {
      line-height: 1.2;
      margin: 0 0 16px;
    }

    h1 {
      font-size: clamp(2rem, 4vw, 3rem);
      letter-spacing: -0.02em;
    }

    h2 {
      margin-top: 28px;
      font-size: 1.25rem;
      color: var(--accent);
    }

    p {
      margin: 0 0 14px;
    }

    .eyebrow {
      display: inline-block;
      margin-bottom: 14px;
      color: var(--muted);
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    a {
      color: var(--accent);
    }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <div class="eyebrow">SetWorkouts</div>
      <h1>Support</h1>

      <p>If you need help with SetWorkouts, have a bug to report, or want to request a feature, contact the developer by email.</p>

      <h2>Email</h2>
      <p><a href="mailto:jcmcgee25@icloud.com">jcmcgee25@icloud.com</a></p>

      <h2>Privacy Policy</h2>
      <p><a href="https://thejustinmcgee.github.io/setworkouts-privacy/">View the SetWorkouts Privacy Policy</a></p>
    </section>
  </main>
</body>
</html>
